<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Yuno</title>
<link rel="stylesheet" href="login.css">
</head>

<body>

<div class="container">

    <!-- LADO IZQUIERDO -->
    <div class="left"></div>

    <!-- LADO DERECHO -->
    <div class="right">

        <img src="media/yuno2c.png" class="logo" alt="logo">

        <!-- FORMULARIO -->
        <form class="formulario" action="#" method="POST">

            <input type="text" name="usuario" placeholder="Usuario o correo" required>

            <input type="password" name="password" placeholder="Contraseña" required>

            <a href="#" class="link">¿Olvidaste tu contraseña?</a>

            <div class="buttons">
                <button type="button"><a href="registro.html" class="link">Registrate</a></button>
                <button type="submit">Acceder</button>
            </div>

        </form>

        <div class="footer">
            Nutrición inteligente para una vida sin límites
        </div>

    </div>

</div>

</body>
</html>
