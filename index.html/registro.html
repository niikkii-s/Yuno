<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Yuno</title>
    <link rel="stylesheet" href="registro.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>

<body>

<div class="container">

    <h2>Crear cuenta</h2>

    <!-- INFORMACIÓN PERSONAL -->
    <input type="text" placeholder="Nombre completo">

    <input type="email" placeholder="Correo">

    <input type="date" placeholder="Fecha de nacimiento">

    <input type="password" placeholder="Contraseña">

    <input type="password" placeholder="Confirmar contraseña">

    <!-- DATOS FÍSICOS -->
    <div class="fila">

      <input type="number" placeholder="Peso (kg)">

      <input type="number" placeholder="Altura (cm)">

    </div>
    
    <!-- RESTRICCIONES -->
    <select>
        <option disabled selected>Restricciones o dieta</option>
        <option>Vegetariano</option>
        <option>Vegano</option>
        <option>Sin gluten</option>
        <option>Intolerante a la lactosa</option>
        <option>Ninguna</option>
    </select>

    <button class="btn">Registrarse</button>

    <a href="login.html">Volver a la página principal</a>

</div>

</body>
</html>
